<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VTC Passager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js" integrity="sha512-dKumPvfS4/0eE3ZVq0ZtTWGxkaSmdIBleOYh9ULs1Ff+lvnQPkzCwwa8z/d9jMJc06W/w5HeFS4Jz+P9kXfRlQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.18.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.18.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background:#f3f4f6; }
    .app-shell { display:grid; grid-template-columns: 1fr 420px; min-height:100vh; }
    .map-panel { position:relative; }
    #map { position:absolute; inset:0; }
    .panel { padding: 24px; display:flex; flex-direction:column; gap:20px; background:#ffffff; border-left:1px solid #e5e7eb; }
    .card { background:#f8fafc; padding:18px; border-radius:20px; box-shadow:0 10px 30px rgba(15,23,42,.05); }
    input, button { width:100%; border:1px solid #cbd5e1; border-radius:14px; padding:14px 16px; font-size:15px; }
    button { background:#0ea5e9; color:#fff; font-weight:700; border:none; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .status-chip { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; font-size:14px; background:#e0f2fe; color:#0369a1; }
    .info-row { display:grid; grid-template-columns: 1fr auto; gap:18px; align-items:start; }
    .info-label { color:#475569; font-size:13px; margin-bottom:8px; }
    .info-value { font-size:18px; font-weight:700; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="map-panel">
      <div id="map"></div>
    </div>
    <div class="panel">
      <div class="card">
        <h2>Réservation</h2>
        <label class="info-label">Point de départ</label>
        <input id="pickup-input" placeholder="Cliquez sur la carte ou entrez l'adresse" />
        <label class="info-label">Destination</label>
        <input id="dropoff-input" placeholder="Cliquez sur la carte ou entrez l'adresse" />
        <button id="route-button">Calculer le trajet</button>
      </div>

      <div id="estimate-card" class="card" style="display:none;">
        <h3>Estimation</h3>
        <div class="info-row"><div><div class="info-label">Distance</div><div class="info-value" id="distance-value">0 km</div></div></div>
        <div class="info-row"><div><div class="info-label">Durée</div><div class="info-value" id="duration-value">0 min</div></div></div>
        <div class="info-row"><div><div class="info-label">Prix</div><div class="info-value" id="fare-value">0 F</div></div></div>
        <button id="confirm-button" disabled>Confirmer la course</button>
      </div>

      <div id="ride-status" class="card" style="display:none;">
        <h3>Suivi en direct</h3>
        <div class="status-chip" id="status-chip">En attente du chauffeur</div>
        <div style="margin-top:18px; display:grid; gap:12px;">
          <div><strong>Chauffeur :</strong> <span id="driver-name">—</span></div>
          <div><strong>Véhicule :</strong> <span id="vehicle-info">—</span></div>
          <div><strong>Distance restante :</strong> <span id="remaining-distance">—</span></div>
          <div><strong>Temps restant :</strong> <span id="remaining-time">—</span></div>
          <div><strong>Vitesse :</strong> <span id="speed-value">—</span></div>
          <div><strong>Plaque :</strong> <span id="plate-value">—</span></div>
          <div><strong>Note :</strong> <span id="rating-value">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';
    const socket = io('http://localhost:3000');
    const passengerId = 'passenger1';

    let map, pickupMarker, dropoffMarker, routeLayer, driverMarker, animationFrame;
    let currentRide = null;
    let lastDriverPos = null;
    let targetDriverPos = null;
    let animationStart = 0;
    let animationDuration = 1800;

    const pickupInput = document.getElementById('pickup-input');
    const dropoffInput = document.getElementById('dropoff-input');
    const routeButton = document.getElementById('route-button');
    const confirmButton = document.getElementById('confirm-button');
    const estimateCard = document.getElementById('estimate-card');
    const distanceValue = document.getElementById('distance-value');
    const durationValue = document.getElementById('duration-value');
    const fareValue = document.getElementById('fare-value');
    const statusChip = document.getElementById('status-chip');
    const rideStatus = document.getElementById('ride-status');
    const driverName = document.getElementById('driver-name');
    const vehicleInfo = document.getElementById('vehicle-info');
    const remainingDistance = document.getElementById('remaining-distance');
    const remainingTime = document.getElementById('remaining-time');
    const speedValue = document.getElementById('speed-value');
    const plateValue = document.getElementById('plate-value');
    const ratingValue = document.getElementById('rating-value');

    const state = {
      pickup: null,
      dropoff: null,
      distance: 0,
      duration: 0,
      fare: 0
    };

    const formatDistance = (meters) => `${(meters / 1000).toFixed(1)} km`;
    const formatDuration = (seconds) => `${Math.round(seconds / 60)} min`;
    const formatPrice = (amount) => `${amount.toFixed(0)} F`;

    const calculatePrice = (distanceMeters, durationSeconds) => {
      const base = 1000;
      const perKm = 250;
      const perMinute = 60;
      return base + (distanceMeters / 1000) * perKm + (durationSeconds / 60) * perMinute;
    };

    const createMap = () => {
      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-17.4710, 14.7167],
        zoom: 11
      });

      map.on('click', async (event) => {
        if (!state.pickup) {
          state.pickup = { lat: event.lngLat.lat, lng: event.lngLat.lng };
          if (pickupMarker) pickupMarker.remove();
          pickupMarker = new mapboxgl.Marker({ color: '#0ea5e9' }).setLngLat(event.lngLat).addTo(map);
          pickupInput.value = `Pickup ${event.lngLat.lat.toFixed(5)}, ${event.lngLat.lng.toFixed(5)}`;
        } else if (!state.dropoff) {
          state.dropoff = { lat: event.lngLat.lat, lng: event.lngLat.lng };
          if (dropoffMarker) dropoffMarker.remove();
          dropoffMarker = new mapboxgl.Marker({ color: '#16a34a' }).setLngLat(event.lngLat).addTo(map);
          dropoffInput.value = `Dropoff ${event.lngLat.lat.toFixed(5)}, ${event.lngLat.lng.toFixed(5)}`;
        }
      });
    };

    const applyRoute = (geojson, distance, duration) => {
      if (routeLayer) {
        map.removeLayer('route-line');
        map.removeSource('route');
      }
      map.addSource('route', { type: 'geojson', data: geojson });
      map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        paint: { 'line-color': '#0ea5e9', 'line-width': 5, 'line-opacity': 0.85 }
      });
      map.fitBounds(geojson.features[0].geometry.coordinates.reduce((bounds, coord) => bounds.extend(coord), new mapboxgl.LngLatBounds(geojson.features[0].geometry.coordinates[0], geojson.features[0].geometry.coordinates[0])), { padding: 60 });
      state.distance = distance;
      state.duration = duration;
      state.fare = calculatePrice(distance, duration);

      distanceValue.textContent = formatDistance(distance);
      durationValue.textContent = formatDuration(duration);
      fareValue.textContent = formatPrice(state.fare);
      estimateCard.style.display = 'block';
      confirmButton.disabled = false;
    };

    const requestRoute = async () => {
      if (!state.pickup || !state.dropoff) {
        alert('Sélectionne votre point de départ et votre destination');
        return;
      }

      const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${state.pickup.lng},${state.pickup.lat};${state.dropoff.lng},${state.dropoff.lat}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
      const response = await fetch(url);
      const data = await response.json();

      if (!data.routes || !data.routes.length) {
        alert('Impossible de calculer l’itinéraire.');
        return;
      }

      const route = data.routes[0];
      applyRoute({ type: 'FeatureCollection', features: [{ type: 'Feature', geometry: route.geometry }] }, route.distance, route.duration);
    };

    const updateDriverMarker = (position) => {
      if (!driverMarker) {
        driverMarker = new mapboxgl.Marker({ color: '#ef4444' }).setLngLat([position.lng, position.lat]).addTo(map);
      }
      if (!lastDriverPos) {
        lastDriverPos = position;
      } else {
        targetDriverPos = position;
        animationStart = performance.now();
      }
    };

    const animateDriver = () => {
      if (!lastDriverPos || !targetDriverPos) {
        animationFrame = requestAnimationFrame(animateDriver);
        return;
      }

      const elapsed = Math.min((performance.now() - animationStart) / animationDuration, 1);
      const lat = lastDriverPos.lat + (targetDriverPos.lat - lastDriverPos.lat) * elapsed;
      const lng = lastDriverPos.lng + (targetDriverPos.lng - lastDriverPos.lng) * elapsed;
      driverMarker.setLngLat([lng, lat]);

      if (elapsed >= 1) {
        lastDriverPos = targetDriverPos;
        targetDriverPos = null;
      }

      animationFrame = requestAnimationFrame(animateDriver);
    };

    const createRide = async () => {
      const response = await fetch('http://localhost:3000/rides', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          passengerId,
          passengerName: 'Aïssatou Ndiaye',
          pickup: state.pickup,
          dropoff: state.dropoff,
          distance: state.distance,
          duration: state.duration,
          fare: state.fare
        })
      });

      const data = await response.json();
      currentRide = data.ride;
      statusChip.textContent = 'En attente du chauffeur';
      rideStatus.style.display = 'block';
      confirmButton.disabled = true;
      routeButton.disabled = true;
      pickupInput.disabled = true;
      dropoffInput.disabled = true;
    };

    routeButton.addEventListener('click', requestRoute);
    confirmButton.addEventListener('click', createRide);

    socket.on('connect', () => {
      socket.emit('register', { type: 'passenger', userId: passengerId });
    });

    socket.on('ride:accepted', (ride) => {
      if (!currentRide || currentRide.id !== ride.id) return;
      currentRide = ride;
      statusChip.textContent = 'Chauffeur trouvé';
      driverName.textContent = ride.driverInfo.name;
      vehicleInfo.textContent = ride.driverInfo.vehicle;
      plateValue.textContent = ride.driverInfo.plate;
      ratingValue.textContent = `${ride.driverInfo.rating.toFixed(1)} / 5`;
      remainingDistance.textContent = formatDistance(ride.distance);
      remainingTime.textContent = formatDuration(ride.duration);
    });

    socket.on('ride:statusUpdate', (payload) => {
      if (!currentRide || currentRide.id !== payload.rideId) return;
      switch (payload.status) {
        case 'driver_found': statusChip.textContent = 'Chauffeur trouvé'; break;
        case 'en_route': statusChip.textContent = 'Chauffeur en route vers vous'; break;
        case 'arrived': statusChip.textContent = 'Chauffeur arrivé'; break;
        case 'ride_started': statusChip.textContent = 'Course commencée'; break;
        case 'ride_ended': statusChip.textContent = 'Course terminée'; break;
        case 'cancelled': statusChip.textContent = 'Course annulée'; break;
        default: statusChip.textContent = payload.status; break;
      }
    });

    socket.on('ride:positionUpdate', (payload) => {
      if (!currentRide || currentRide.id !== payload.rideId) return;
      updateDriverMarker({ lat: payload.lat, lng: payload.lng });
      remainingDistance.textContent = payload.remainingDistance ? formatDistance(payload.remainingDistance) : remainingDistance.textContent;
      remainingTime.textContent = payload.remainingTime ? formatDuration(payload.remainingTime) : remainingTime.textContent;
      speedValue.textContent = payload.speed ? `${payload.speed.toFixed(0)} km/h` : speedValue.textContent;
    });

    createMap();
    animateDriver();
  </script>
</body>
</html>
